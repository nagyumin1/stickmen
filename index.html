<div id="canvas-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: auto; z-index: 9999;">
    <canvas id="stickmanCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("stickmanCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const GRAVITY = 0.4;
const FRICTION = 0.98;

let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
window.parent.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.parent.addEventListener("mousedown", (e) => {
    stickmen.forEach(s => {
        let dx = e.clientX - s.x;
        let dy = e.clientY - s.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < 80) {
            s.vx = (dx === 0 ? (Math.random() - 0.5) * 10 : -dx / dist * 15);
            s.vy = -12;
            s.state = "surprised";
            s.stateTimer = 45;
        }
    });
});

class Stickman {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = 12;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = 0;
        this.walkCycle = Math.random() * Math.PI * 2;
        this.state = "walk";
        this.stateTimer = 0;
        this.groundY = canvas.height - 30;
    }

    update() {
        this.groundY = canvas.height - 30;

        if (this.stateTimer > 0) {
            this.stateTimer--;
            if (this.stateTimer === 0) this.state = "walk";
        }

        if (this.state === "walk") {
            if (Math.random() < 0.02) {
                this.vx += (Math.random() - 0.5) * 4;
            }
            if (Math.random() < 0.005) {
                let dx = mouse.x - this.x;
                this.vx += Math.sign(dx) * 2;
            }
        }

        this.vy += GRAVITY;
        this.vx *= FRICTION;

        this.x += this.vx;
        this.y += this.vy;

        if (this.y >= this.groundY) {
            this.y = this.groundY;
            this.vy = 0;
            
            if (Math.abs(this.vx) > 0.2) {
                this.walkCycle += Math.abs(this.vx) * 0.15;
            }
            
            if (this.state === "walk" && Math.random() < 0.01) {
                this.vy = -Math.random() * 8 - 4;
            }
        }

        if (this.x < 30) { this.x = 30; this.vx *= -0.5; }
        if (this.x > canvas.width - 30) { this.x = canvas.width - 30; this.vx *= -0.5; }
    }

    draw() {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.arc(this.x, this.y - this.size, this.size, 0, Math.PI * 2);
        ctx.stroke();

        if (this.state === "surprised") {
            ctx.font = "bold 16px sans-serif";
            ctx.fillText("!!", this.x - 8, this.y - this.size * 2.5);
        } else if (this.state === "annoyed") {
            ctx.font = "bold 16px sans-serif";
            ctx.fillText("?!", this.x - 8, this.y - this.size * 2.5);
        }

        let torsoTop = this.y;
        let torsoBottom = this.y + this.size * 1.8;
        ctx.beginPath();
        ctx.moveTo(this.x, torsoTop);
        ctx.lineTo(this.x, torsoBottom);
        ctx.stroke();

        let leftLegAngle, rightLegAngle, leftArmAngle, rightArmAngle;

        if (this.y < this.groundY) {
            leftLegAngle = 0.4;
            rightLegAngle = -0.4;
            leftArmAngle = -0.8;
            rightArmAngle = 0.8;
        } else if (this.state === "surprised") {
            leftLegAngle = -0.2;
            rightLegAngle = 0.2;
            leftArmAngle = -2.2;
            rightArmAngle = 2.2;
        } else {
            let swing = Math.sin(this.walkCycle) * 0.6; 
            leftLegAngle = swing;
            rightLegAngle = -swing;
            leftArmAngle = -swing * 0.5;
            rightArmAngle = swing * 0.5;
        }

        let legLength = this.size * 1.8;
        ctx.beginPath();
        ctx.moveTo(this.x, torsoBottom);
        ctx.lineTo(this.x + Math.sin(leftLegAngle) * legLength, torsoBottom + Math.cos(leftLegAngle) * legLength);
        ctx.moveTo(this.x, torsoBottom);
        ctx.lineTo(this.x + Math.sin(rightLegAngle) * legLength, torsoBottom + Math.cos(rightLegAngle) * legLength);
        ctx.stroke();

        let armLength = this.size * 1.5;
        let armY = torsoTop + this.size * 0.5;
        ctx.beginPath();
        ctx.moveTo(this.x, armY);
        ctx.lineTo(this.x + Math.sin(leftArmAngle) * armLength, armY + Math.cos(leftArmAngle) * armLength);
        ctx.moveTo(this.x, armY);
        ctx.lineTo(this.x + Math.sin(rightArmAngle) * armLength, armY + Math.cos(rightArmAngle) * armLength);
        ctx.stroke();
    }
}

const stickmen = [
    new Stickman(200, 100, "#FF3333"),
    new Stickman(400, 100, "#33FF33"),
    new Stickman(600, 100, "#3333FF"),
    new Stickman(800, 100, "#FFFF33")
];

function handleStickmanCollisions() {
    for (let i = 0; i < stickmen.length; i++) {
        for (let j = i + 1; j < stickmen.length; j++) {
            let s1 = stickmen[i];
            let s2 = stickmen[j];

            let dx = s2.x - s1.x;
            let dy = s2.y - s1.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let minDist = 35;

            if (dist < minDist && dist > 0) {
                let overlap = minDist - dist;
                let pushX = (dx / dist) * overlap * 0.5;
                
                s1.x -= pushX;
                s2.x += pushX;

                s1.vx -= Math.sign(pushX) * 1.5;
                s2.vx += Math.sign(pushX) * 1.5;

                if (s1.state === "walk" && Math.random() < 0.3) {
                    s1.state = "annoyed";
                    s1.stateTimer = 40;
                }
                if (s2.state === "walk" && Math.random() < 0.3) {
                    s2.state = "annoyed";
                    s2.stateTimer = 40;
                }
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    handleStickmanCollisions();
    stickmen.forEach(s => {
        s.update();
        s.draw();
    });
    requestAnimationFrame(animate);
}

animate();
</script>
