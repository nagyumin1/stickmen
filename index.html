<div id="canvas-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: auto; z-index: 9999;">
    <canvas id="stickmanCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("stickmanCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const GRAVITY = 0.35; 
const FRICTION = 0.96; 
const GROUND_OFFSET = 40; 

let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, isDown: false };
let draggedStickman = null;

// 스트림릿 부모 창의 마우스 이벤트 감지
window.parent.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.parent.addEventListener("mousedown", (e) => {
    mouse.isDown = true;
    
    // 마우스가 스틱맨 근처(특히 머리나 몸통)에 있는지 확인
    stickmen.forEach(s => {
        let dx = e.clientX - s.x;
        let dy = e.clientY - (s.y - s.size * 1.5); 
        let dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < s.size * 3) { 
            draggedStickman = s;
            s.vx = 0;
            s.vy = 0;
        }
    });
});

window.parent.addEventListener("mouseup", () => {
    mouse.isDown = false;
    draggedStickman = null;
});

class Stickman {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = 11;
        this.vx = 0;
        this.vy = 0;
        this.walkCycle = Math.random() * Math.PI * 2;
        this.stateTimer = 0;
        this.groundY = canvas.height - GROUND_OFFSET;
    }

    update() {
        this.groundY = canvas.height - GROUND_OFFSET;

        if (this.stateTimer > 0) {
            this.stateTimer--;
        }

        // 마우스로 잡고 있는 상태일 때
        if (this === draggedStickman) {
            this.x = mouse.x;
            this.y = mouse.y;
            this.vx = 0;
            this.vy = 0;
        } else {
            // 평소에 땅에 있을 때만 아주 가끔 조금씩 움직이도록 진정시킴
            if (this.y >= this.groundY) {
                if (Math.random() < 0.004) { 
                    this.vx += (Math.random() - 0.5) * 1.5; 
                }
            }

            this.vy += GRAVITY;
            this.vx *= FRICTION;
            this.x += this.vx;
            this.y += this.vy;

            // 바닥 충돌 처리
            if (this.y >= this.groundY) {
                this.y = this.groundY;
                this.vy = 0;
                if (Math.abs(this.vx) > 0.1) {
                    this.walkCycle += Math.abs(this.vx) * 0.12;
                }
                
                // 가끔 뛰던 무작위 점프 확률을 대폭 낮추고 높이도 줄임
                if (Math.random() < 0.001) { 
                    this.vy = -Math.random() * 4 - 2; 
                }
            }
        }

        // 화면 밖으로 탈출 방지 벽 설정
        if (this.x < 40) { this.x = 40; this.vx *= -0.3; }
        if (this.x > canvas.width - 40) { this.x = canvas.width - 40; this.vx *= -0.3; }
        if (this.y < 40) { this.y = 40; this.vy *= -0.3; }
    }

    draw() {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3.5;
        ctx.lineCap = "round";
        ctx.fillStyle = this.color;

        // 부딪혔을 때 느낌표를 매번 띄우지 않고 20% 확률로만 조절
        let showExclamation = false;
        if (this.stateTimer > 0) {
            stickmen.forEach(other => {
                if (this !== other) {
                    let dx = other.x - this.x;
                    let dy = other.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 40 && Math.random() < 0.20) { 
                        showExclamation = true;
                    }
                }
            });
        }

        if (showExclamation) {
            ctx.font = "bold 16px sans-serif";
            ctx.fillText("!!", this.x - 6, this.y - this.size * 3.8);
        }

        let torsoTop = this.y - this.size * 1.5;
        let torsoBottom = this.y + this.size * 0.3;
        
        // 머리 그리기
        ctx.beginPath();
        ctx.arc(this.x, torsoTop - this.size, this.size, 0, Math.PI * 2);
        ctx.stroke();

        // 몸통 그리기
        ctx.beginPath();
        ctx.moveTo(this.x, torsoTop);
        ctx.lineTo(this.x, torsoBottom);
        ctx.stroke();

        let swing = Math.sin(this.walkCycle) * 0.4; 

        // 다리 그리기
        let legLength = this.size * 1.8;
        ctx.beginPath();
        ctx.moveTo(this.x, torsoBottom);
        ctx.lineTo(this.x + Math.sin(swing) * legLength, torsoBottom + Math.cos(swing) * legLength);
        ctx.moveTo(this.x, torsoBottom);
        ctx.lineTo(this.x + Math.sin(-swing) * legLength, torsoBottom + Math.cos(-swing) * legLength);
        ctx.stroke();

        // 팔 그리기
        let armLength = this.size * 1.5;
        let armY = torsoTop + this.size * 0.4;
        ctx.beginPath();
        ctx.moveTo(this.x, armY);
        ctx.lineTo(this.x + Math.sin(-swing * 0.5) * armLength, armY + Math.cos(-swing * 0.5) * armLength);
        ctx.moveTo(this.x, armY);
        ctx.lineTo(this.x + Math.sin(swing * 0.5) * armLength, armY + Math.cos(swing * 0.5) * armLength);
        ctx.stroke();
    }
}

const stickmen = [
    new Stickman(200, 200, "#EE4444"),
    new Stickman(400, 200, "#44EE44"),
    new Stickman(600, 200, "#4444EE"),
    new Stickman(800, 200, "#EEEE44")
];

function handleStickmanCollisions() {
    for (let i = 0; i < stickmen.length; i++) {
        for (let j = i + 1; j < stickmen.length; j++) {
            let s1 = stickmen[i];
            let s2 = stickmen[j];
            let dx = s2.x - s1.x;
            let dy = s2.y - s1.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let minDist = 35;

            if (dist < minDist && dist > 0) {
                let overlap = minDist - dist;
                let pushX = (dx / dist) * overlap * 0.25; 
                
                // 마우스로 붙잡고 있는 스틱맨은 밀려나지 않게 방어
                if (s1 !== draggedStickman) s1.x -= pushX;
                if (s2 !== draggedStickman) s2.x += pushX;

                if (s1 !== draggedStickman) s1.vx -= Math.sign(pushX) * 0.5;
                if (s2 !== draggedStickman) s2.vx += Math.sign(pushX) * 0.5;

                s1.stateTimer = 15;
                s2.stateTimer = 15;
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    handleStickmanCollisions();
    stickmen.forEach(s => { s.update(); s.draw(); });
    requestAnimationFrame(animate);
}
animate();
</script>
